name: Update Stock Data

on:
  schedule:
    # 台股收盤約 13:30,這裡設定每個交易日 台灣時間13:50(UTC 05:50)執行
    # cron 使用 UTC 時間, 05:50 UTC = 13:50 台灣時間
    - cron: "50 5 * * 1-5"
  workflow_dispatch: {}   # 允許手動在GitHub網頁上點按鈕觸發

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and build JSON
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/build_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --staged --quiet && echo "無資料變動" || git commit -m "自動更新股票資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
