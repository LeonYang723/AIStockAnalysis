<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股AI分析</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <h1>台股技術分析</h1>
    <div class="controls">
      <label for="stock-select">股票:</label>
      <select id="stock-select"></select>
      <span id="updated-at" class="updated-at"></span>
    </div>
  </header>

  <main>
    <section class="chart-section">
      <div class="chart-header">
        <span>K線 / 均線</span>
        <div class="ma-legend" id="ma-legend"></div>
      </div>
      <div id="price-chart" class="chart-box price-chart"></div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span>RSI</span>
      </div>
      <div id="rsi-chart" class="chart-box rsi-chart"></div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span>三大法人買賣超(張)</span>
        <div class="legend-static">
          <span class="dot foreign"></span>外資
          <span class="dot trust"></span>投信
          <span class="dot dealer"></span>自營商
        </div>
      </div>
      <div id="institutional-chart" class="chart-box inst-chart"></div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span>融資融券餘額</span>
        <div class="legend-static">
          <span class="dot margin"></span>融資餘額(左軸)
          <span class="dot short"></span>融券餘額(右軸)
        </div>
      </div>
      <div id="margin-chart" class="chart-box margin-chart"></div>
    </section>
    <section class="chart-section">
      <div class="chart-header">
        <span>本益比 / 淨值比</span>
        <div class="legend-static">
          <span class="dot per"></span>本益比 PER(左軸)
          <span class="dot pbr"></span>淨值比 PBR(右軸)
        </div>
      </div>
      <div id="valuation-chart" class="chart-box valuation-chart"></div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span>基本面(近8季)</span>
      </div>
      <div class="fund-table-wrap">
        <table class="fund-table" id="fund-table">
          <thead><tr id="fund-table-head"></tr></thead>
          <tbody id="fund-table-body"></tbody>
        </table>
      </div>
      <p class="fund-note">EPS / 毛利率 / 營益率 / ROE / ROA 為單季數字(非年化);營收與營業現金流單位為億元</p>
    </section>
  </main>

  <footer>
    資料來源: FinMind &middot; 僅供技術研究參考,非投資建議
  </footer>

  <script src="app.js"></script>
</body>
</html>
