<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股AI分析</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <h1>台股技術分析</h1>
    <div class="controls">
      <label for="stock-select">股票:</label>
      <select id="stock-select"></select>
      <span id="updated-at" class="updated-at"></span>
    </div>
  </header>

  <main>
    <section class="chart-section">
      <div class="chart-header">
        <span>K線 / 均線</span>
        <div class="ma-legend" id="ma-legend"></div>
      </div>
      <div id="price-chart" class="chart-box price-chart"></div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span>RSI</span>
      </div>
      <div id="rsi-chart" class="chart-box rsi-chart"></div>
    </section>
  </main>

  <footer>
    資料來源: FinMind &middot; 僅供技術研究參考,非投資建議
  </footer>

  <script src="app.js"></script>
</body>
</html>
